name: Sync from Backup to Integration Branch

on:
  workflow_dispatch:

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout couponslive repository (integration branch)
        uses: actions/checkout@v3
        with:
          path: couponslive
          ref: integration  # Explicitly checkout the integration branch
          token: ${{ secrets.GH_PAT }}  # Provide the token for authentication

      - name: Checkout private-backup-of-payload repository
        uses: actions/checkout@v3
        with:
          repository: ahmedfa211/private-backup-of-payload
          path: private-backup-of-payload
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Debug Git Remote and Branch
        run: |
          cd couponslive
          echo "### Debugging Git Remote ###"
          git remote -v
          echo "### Debugging Current Branch ###"
          git branch

      - name: Sync changes
        run: |
          # Copy all files from private-backup-of-payload to couponslive (excluding .git)
          rsync -av --exclude='.git' ./private-backup-of-payload/ ./couponslive/
          
          # Go to couponslive directory
          cd couponslive
          
          # Set the remote URL with token authentication
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/ahmedfa211/couponslive.git
          
          # Debug the new remote URL
          echo "### Debugging New Remote URL ###"
          git remote -v
          
          # Check if there are changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            # Add, commit, and push changes
            git add .
            git commit -m "Sync changes from private-backup-of-payload repo"
            # Explicitly push to integration branch
            git push origin integration
          else
            echo "No changes to sync"
          fi
