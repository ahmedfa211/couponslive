name: Sync Backup to CouponsLive Integration

on:
  # Trigger when changes are pushed to the backup repo
    workflow_dispatch:


jobs:
  sync-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private-backup-of-payload repository
        uses: actions/checkout@v3
        with:
          path: private-backup-of-payload
          # Use the repository where this workflow file is located
          # No need for additional parameters as this is the default repo

      - name: Checkout couponslive repository
        uses: actions/checkout@v3
        with:
          repository: ahmedfa211/couponslive  # Using your actual username
          path: couponslive-repo
          token: ${{ secrets.PAT_TOKEN }}  # Personal Access Token with repo scope
          ref: integration  # Target branch in couponslive repo

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync changes
        run: |
          # Copy all files from private-backup-of-payload to couponslive-repo (excluding .git)
          rsync -av --exclude='.git' ./private-backup-of-payload/ ./couponslive-repo/
          
          # Go to couponslive repo
          cd couponslive-repo
          
          # Check if there are changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            # Add, commit and push changes
            git add .
            git commit -m "Sync changes from private-backup-of-payload repo"
            git push origin integration
          else
            echo "No changes to sync"
          fi
