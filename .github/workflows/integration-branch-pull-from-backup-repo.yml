name: Sync from Backup to Integration Branch

on:
  workflow_dispatch:

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout couponslive repository (integration branch)
        uses: actions/checkout@v3
        with:
          path: couponslive-repo
          ref: integration  # Explicitly checkout the integration branch
          token: ${{ secrets.GH_PAT}}

      - name: Checkout private-backup-of-payload repository
        uses: actions/checkout@v3
        with:
          repository: ahmedfa211/private-backup-of-payload
          path: private-backup-of-payload
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync changes
        run: |
          # Copy all files from private-backup-of-payload to couponslive-repo (excluding .git)
          rsync -av --exclude='.git' ./private-backup-of-payload/ ./couponslive-repo/
          
          # Go to couponslive repo
          cd couponslive-repo
          
          # Check if there are changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            # Add, commit and push changes
            git add .
            git commit -m "Sync changes from private-backup-of-payload repo"
            # Explicitly push to integration branch
            git push origin integration
          else
            echo "No changes to sync"
          fi
