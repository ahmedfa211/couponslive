name: Sync Template from Private Backup

on:
  workflow_dispatch:

jobs:
  sync-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout integration branch of couponslive
        uses: actions/checkout@v4
        with:
          ref: integration
          token: ${{ secrets.PAT_TOKEN }}

      - name: Fetch folder from private backup
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ahmedfa211/private-backup-of-payload.git backup
          cd backup
          git sparse-checkout set templates/with-vercel-website
          cd ..
          rm -rf ./*
          cp -r backup/templates/with-vercel-website/* ./
          rm -rf backup

      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Synced with latest template from backup"
          git push origin integration
