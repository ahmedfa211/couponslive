name: Sync Template from Private Backup (Sparse)

on:
  workflow_dispatch:

jobs:
  sync-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout couponslive (integration branch)
        uses: actions/checkout@v4
        with:
          ref: integration
          token: ${{ secrets.PAT_TOKEN }}

      - name: Init sparse checkout of backup repo folder
        run: |
          mkdir sparse-source
          cd sparse-source
          git init
          git remote add origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ahmedfa211/private-backup-of-payload.git
          git config core.sparseCheckout true
          echo "templates/with-vercel-website/" >> .git/info/sparse-checkout
          git pull origin main
          cd ..

      - name: Sync templates/with-vercel-website to root
        run: |
          echo "✅ Copying template to root..."
          rm -rf ./*
          rsync -a sparse-source/templates/with-vercel-website/ ./

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git commit -m "Synced template using sparse checkout" || echo "No changes to commit."
          git push origin integration
