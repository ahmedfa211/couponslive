name: Sync Template from Private Backup

on:
  workflow_dispatch:

jobs:
  sync-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout couponslive (integration branch)
        uses: actions/checkout@v4
        with:
          ref: integration
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone private-backup-of-payload
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ahmedfa211/private-backup-of-payload.git temp-backup

      - name: Sync templates/with-vercel-website to root
        run: |
          if [ -d "temp-backup/templates/with-vercel-website" ]; then
            echo "✅ Folder found. Replacing current directory contents..."
            rm -rf ./*
            cp -r temp-backup/templates/with-vercel-website/* .
          else
            echo "❌ Folder not found: temp-backup/templates/with-vercel-website"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git commit -m "Sync latest template from private backup" || echo "No changes to commit."
          git push origin integration
